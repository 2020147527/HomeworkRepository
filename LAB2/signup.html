<html>
   <head>
      <meta charset = "utf-8">
      <title> 회원가입 페이지 </title>
      <link rel = "stylesheet" type = "test/css" href = "main.css"/>
   </head>

   <body>
     <header>
       <div class='header'>
         <h1>Welcome to Easy Shopping</h1>
         <nav>
           <ul>
             <li><a href = 'login.html'>로그인</a></li>
             <li><a class = 'now' href = 'signup.html'>회원가입</a></li>
           </ul>
         </nav>
       </div>
     </header>
     <div class = 'main'>
     <form method = "get">
     <p> 개인정보 (필수)
        <p><label> 이름 :<input name = "name" type = "text" size = 25 placeholder = "이름을 입력하세요" required autocomplete="name" autofocus/></label></p>
        <p><label> 생일 :<input name = "bday" type = "date" required/></label></p>
        <p><label> 학년 :<input name = "grade" type = "number" min = "1" max = "9" step = "1" required/></label></p>
        <p><label> 전화번호 :<input type = "tel" placeholder="(###)####-####" pattern="\(\d{3}\)+\d{4}-\d{4}" required/></label></p>
        <p><label> 유저 아이디 :<input name = "userID" type = "text" size = 25 placegolder = "아이디를 입력하세요" required autocomplete="userID" autofocus/></label></p>
        <p><label> 비밀번호 :<input name = "userPW" type = "text" size = 25 placegolder = "비밀번호를 입력하세요" required autocomplete="userPW" autofocus/></label></p>
        <p><label> 비밀번호 확인 :<input name = "re_userPW" type = "text" size = 25 placegolder = "비밀번호를 다시 입력하세요" required autocomplete="re_userPW" autofocus/></label></p>
     </p>

     <div class = "button">
       <button type = "submit" class = "signupbutton">Signup</button>
       <button type = "button" class="canclebutton">Cancel</button>
     </div>

     </form>
    
     </div>

    <footer>
      <div class = "footer"></div>
    </footer>

  </body>
</html>
